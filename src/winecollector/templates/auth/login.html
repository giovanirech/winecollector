{% extends "base.html" %}
{% block title %}Entrar · Adega{% endblock %}

{% block content %}
<section class="max-w-sm mx-auto">
  <h1 class="text-2xl font-semibold text-rose-950 mb-1">Entrar</h1>
  <p class="text-sm text-stone-600 mb-6">Acesse sua adega pessoal.</p>

  {% if error %}
    <div class="mb-4 rounded-lg border border-rose-300 bg-rose-50 text-rose-800 px-3 py-2 text-sm">
      {{ error }}
    </div>
  {% endif %}

  <form method="post" action="/auth/login" class="space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium mb-1">E-mail</label>
      <input id="username" name="username" type="email" autocomplete="email" required
             class="w-full rounded-lg border border-stone-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-rose-900">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium mb-1">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required
             class="w-full rounded-lg border border-stone-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-rose-900">
    </div>
    <button type="submit"
            class="w-full bg-rose-900 text-rose-50 rounded-lg py-2 font-medium hover:bg-rose-800">
      Entrar
    </button>
  </form>
</section>
{% endblock %}
